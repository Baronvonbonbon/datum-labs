# Standalone tunnel for the advertiser co-signer (Option B).
# Fill <TUNNEL_UUID> + credentials, route a hostname, then:
#   cloudflared tunnel --config this-file.yml run
tunnel: <TUNNEL_UUID>
credentials-file: ~/.cloudflared/<TUNNEL_UUID>.json
ingress:
  - hostname: <adv-cosign-host>
    service: http://127.0.0.1:3411
  - service: http_status:404
